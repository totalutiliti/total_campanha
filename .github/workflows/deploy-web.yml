name: Deploy Web

on:
  # Deploy automático em push na main fica DESABILITADO até o Azure estar
  # provisionado (falta o secret AZURE_CREDENTIALS). Reative o bloco `push`
  # quando a infra estiver pronta — ver docs/runbooks/deploy-prod.md.
  # push:
  #   branches: [main]
  #   paths: ['apps/web/**', 'packages/shared/**', '.github/workflows/deploy-web.yml']
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  RG: rg-totalcampanha-prod
  APP: tc-web-prod
  ACR: acrtotalcampanha01
  IMAGE: tc-web
  WEB_URL: https://app.totalcampanha.com.br
  NEXT_PUBLIC_API_URL: https://api.totalcampanha.com.br/api/v1
  NEXT_PUBLIC_APP_URL: https://app.totalcampanha.com.br

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint & typecheck
        run: |
          pnpm --filter @total-campanha/web lint
          pnpm --filter @total-campanha/web typecheck

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: az acr login --name $ACR

      - name: Build & push
        run: |
          IMAGE_TAG=prod-${GITHUB_SHA::7}
          # NEXT_PUBLIC_* é embutido em build time — passa como build-arg.
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            --build-arg NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL \
            -t $ACR.azurecr.io/$IMAGE:$IMAGE_TAG .
          docker push $ACR.azurecr.io/$IMAGE:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy Container App
        run: |
          az containerapp update -g $RG -n $APP \
            --image $ACR.azurecr.io/$IMAGE:$IMAGE_TAG

      - name: Wait health check
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $WEB_URL || true)
            if [ "$STATUS" = "200" ]; then echo "web OK"; exit 0; fi
            echo "tentativa $i: $STATUS — aguardando..."
            sleep 10
          done
          echo "web health check falhou"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(az containerapp revision list -g $RG -n $APP \
            --query "[?properties.active] | sort_by(@, &properties.createdTime) | [-2].name" -o tsv)
          if [ -n "$PREV" ]; then
            echo "Rollback para $PREV"
            az containerapp ingress traffic set -g $RG -n $APP --revision-weight "$PREV=100"
          fi

      - name: Notify Slack
        if: always()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'content-type: application/json' \
              -d "{\"text\":\"Deploy tc-web: ${{ job.status }} (${GITHUB_SHA::7})\"}"
          fi
