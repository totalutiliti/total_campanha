name: Secret Scan

# Varredura de segredos com gitleaks (00_prompt-seguranca-senhas.md §8).
# Roda em toda PR, em push para main/dev, e semanalmente (varredura do histórico).

on:
  pull_request:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1' # segunda-feira 06:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para a varredura

      - name: Instalar gitleaks
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Detectar segredos
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1
